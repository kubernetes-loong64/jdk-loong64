name: build

on:
  push:
    branches:
      - main
    paths:
      - docker/**
      - .github/workflows/build.yml
  pull_request:
    branches:
      - main
    paths:
      - docker/**
      - .github/workflows/build.yml

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        base:
          - os: anolis
            dockerfile: Dockerfile.anolis
          - os: debian
            dockerfile: Dockerfile.debian
        jdk:
          - version: "8"
            url: "https://ftp.loongnix.cn/Java/openjdk8/loongson8.1.27-fx-jdk8u492b09-linux-loongarch64-glibc2.34.tar.gz"
          - version: "11"
            url: "https://ftp.loongnix.cn/Java/openjdk11/loongson11.18.27-fx-jdk11.0.31_11-linux-loongarch64-glibc2.34.tar.gz"
          - version: "17"
            url: "https://ftp.loongnix.cn/Java/openjdk17/loongson17.18.25-fx-jdk17.0.19_10-linux-loongarch64-glibc2.34.tar.gz"
          - version: "21"
            url: "https://ftp.loongnix.cn/Java/openjdk21/loongson21.11.38-fx-jdk21.0.11_10-linux-loongarch64-glibc2.34.tar.gz"
          - version: "25"
            url: "https://ftp.loongnix.cn/Java/openjdk25/loongson25.3.20-fx-jdk25.0.2_10-linux-loongarch64-glibc2.34.tar.gz"
          - version: "26"
            url: "https://ftp.loongnix.cn/Java/openjdk26/loongson26.1.11-fx-jdk26_35-linux-loongarch64-glibc2.34.tar.gz"

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to Docker
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        if: github.event_name == 'push'
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        if: github.event_name != 'push'
        run: |
          TAG="${{ github.repository }}:${{ matrix.jdk.version }}-${{ matrix.base.os }}"
          echo "==> Building ${TAG}"
          docker buildx build \
            --no-cache \
            -f "docker/${{ matrix.base.dockerfile }}" \
            --build-arg "JDK_VERSION=${{ matrix.jdk.version }}" \
            --build-arg "JDK_TARBALL_URL=${{ matrix.jdk.url }}" \
            --build-arg "JDK_MD5SUM_URL=${{ matrix.jdk.url }}.md5sum" \
            --platform linux/loong64 \
            -t "${TAG}" \
            docker/
          echo "==> Done: ${TAG}"

      - name: Build and push image
        if: github.event_name == 'push'
        run: |
          TAG="kubernetesloong64/jdk-loong64:${{ matrix.jdk.version }}-${{ matrix.base.os }}"
          echo "==> Building ${TAG}"
          docker buildx build \
            --push \
            --no-cache \
            -f "docker/${{ matrix.base.dockerfile }}" \
            --build-arg "JDK_VERSION=${{ matrix.jdk.version }}" \
            --build-arg "JDK_TARBALL_URL=${{ matrix.jdk.url }}" \
            --build-arg "JDK_MD5SUM_URL=${{ matrix.jdk.url }}.md5sum" \
            --platform linux/loong64 \
            -t "${TAG}" \
            docker/
          echo "==> Done: ${TAG}"
